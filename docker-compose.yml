version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaizen
      POSTGRES_PASSWORD: kaizen
      POSTGRES_DB: kaizen
    ports:
      - '5432:5432'
    volumes:
      - kaizen_pg_data:/var/lib/postgresql/data

volumes:
  kaizen_pg_data:
